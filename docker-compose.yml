# Orquestación local/productiva del Módulo de Analítica Predictiva
# Variables sensibles en un archivo .env junto a este compose:
#   SUPABASE_URL=...  SUPABASE_SERVICE_KEY=...  JWT_SECRET=...
services:
  ml-service:
    build: ./ml-service
    container_name: abandono-ml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    container_name: abandono-api
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      - ml-service

  frontend:
    build: ./frontend
    container_name: abandono-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
